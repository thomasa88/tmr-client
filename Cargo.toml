[package]
name = "mr-client"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
axum = "0.8.8"
reqwest = "0.13.2"
rmcp = { version = "1.2.0", default-features = false, features = [
  "transport-async-rw",
  "client",
  "reqwest",
  "transport-streamable-http-client-reqwest",
  "transport-child-process",
  "tower",
  "auth",
] }
serde = "1.0.228"
tokio = { version = "1.50.0", features = ["io-std", "macros", "rt-multi-thread"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
